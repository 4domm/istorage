services:
  foundationdb:
    image: foundationdb/foundationdb:7.3.69
    environment:
      FDB_CLUSTER_FILE_CONTENTS: docker:docker@foundationdb:4500
    healthcheck:
      test: ["CMD-SHELL", "pgrep fdbserver >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - foundationdb_data:/var/fdb/data
      - foundationdb_logs:/var/fdb/logs
    ports:
      - "4500:4500"

  foundationdb-init:
    image: foundationdb/foundationdb:7.3.69
    environment:
      FDB_CLUSTER_FILE_CONTENTS: docker:docker@foundationdb:4500
    depends_on:
      foundationdb:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "for i in $(seq 1 30); do
         fdbcli --exec 'configure new single memory; status' && exit 0;
         sleep 2;
       done;
       exit 1"

  metadata:
    build:
      context: .
      target: metadata-service
    environment:
      LOG_LEVEL: info
      FDB_CLUSTER_FILE_CONTENTS: docker:docker@foundationdb:4500
      FDB_API_VERSION: 730
      METADATA_GC_BATCH_SIZE: 128
      CHUNKER_NODES: chunker-a=http://chunker-a:3002,chunker-b=http://chunker-b:3002
      CHUNKER_HEALTHCHECK_INTERVAL_MS: 2000
    depends_on:
      foundationdb-init:
        condition: service_completed_successfully
    ports:
      - "3001:3001"

  chunker-a:
    build:
      context: .
      target: chunker-service
    environment:
      CHUNKER_LOG_FILTER: chunker=info,tower_http=info
      CHUNK_PORT: 3002
    volumes:
      - chunk_a_data:/data/chunks
    ports:
      - "3002:3002"

  chunker-b:
    build:
      context: .
      target: chunker-service
    environment:
      CHUNKER_LOG_FILTER: chunker=info,tower_http=info
      CHUNK_PORT: 3002
    volumes:
      - chunk_b_data:/data/chunks
    ports:
      - "3003:3002"

  api-service:
    build:
      context: .
      target: api-service
    environment:
      API_SERVICE_LOG_FILTER: api_service=info,tower_http=info
      API_GET_BATCH_WINDOW: 16
    depends_on:
      - metadata
      - chunker-a
      - chunker-b
    ports:
      - "3000:3000"

volumes:
  foundationdb_data:
  foundationdb_logs:
  chunk_a_data:
  chunk_b_data:

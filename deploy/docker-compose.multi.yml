services:
  coordinator-a:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      target: coordinator
    volumes:
      - ./configs/multi/coordinator-a.yaml:/app/deploy/configs/coordinator.yaml:ro
      - coordinator_a_data:/app/data
    ports:
      - "9000:9000"
    networks:
      - shard-a
      - shard-b

  coordinator-b:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      target: coordinator
    volumes:
      - ./configs/multi/coordinator-b.yaml:/app/deploy/configs/coordinator.yaml:ro
      - coordinator_b_data:/app/data
    ports:
      - "9001:9000"
    networks:
      - shard-a
      - shard-b

  volume-a1:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      target: volume
    volumes:
      - ./configs/multi/volume-a1.yaml:/app/deploy/configs/volume.yaml:ro
      - volume_a1_data:/app/data
    networks:
      - shard-a

  volume-a2:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      target: volume
    volumes:
      - ./configs/multi/volume-a2.yaml:/app/deploy/configs/volume.yaml:ro
      - volume_a2_data:/app/data
    networks:
      - shard-a

  volume-b1:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      target: volume
    volumes:
      - ./configs/multi/volume-b1.yaml:/app/deploy/configs/volume.yaml:ro
      - volume_b1_data:/app/data
    networks:
      - shard-b

  volume-b2:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
      target: volume
    volumes:
      - ./configs/multi/volume-b2.yaml:/app/deploy/configs/volume.yaml:ro
      - volume_b2_data:/app/data
    networks:
      - shard-b

networks:
  shard-a:
  shard-b:

volumes:
  coordinator_a_data:
  coordinator_b_data:
  volume_a1_data:
  volume_a2_data:
  volume_b1_data:
  volume_b2_data:

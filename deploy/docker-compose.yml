services:
  foundationdb:
    image: foundationdb/foundationdb:7.3.69
    environment:
      FDB_CLUSTER_FILE_CONTENTS: docker:docker@foundationdb:4500
    healthcheck:
      test: ["CMD-SHELL", "pgrep fdbserver >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - foundationdb_data:/var/fdb/data
      - foundationdb_logs:/var/fdb/logs
    ports:
      - "4500:4500"

  foundationdb-init:
    image: foundationdb/foundationdb:7.3.69
    depends_on:
      foundationdb:
        condition: service_healthy
    network_mode: "service:foundationdb"
    entrypoint:
      - /bin/bash
      - -lc
      - |
          set -euo pipefail
          mkdir -p /var/fdb
          cat > /var/fdb/fdb.cluster <<'EOF'
          docker:docker@127.0.0.1:4500
          EOF
          for i in $(seq 1 30); do
            fdbcli -C /var/fdb/fdb.cluster --exec "configure new single memory; status" && exit 0
            sleep 2
          done
          exit 1

  metadata:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: metadata-service
    environment:
      LOG_LEVEL: info
      FDB_CLUSTER_FILE_CONTENTS: docker:docker@foundationdb:4500
      FDB_API_VERSION: 730
      METADATA_GC_BATCH_SIZE: 128
      CHUNKER_NODES: chunker-a@zone-a=http://chunker-a:3002,chunker-b@zone-b=http://chunker-b:3002
      CHUNKER_HEALTHCHECK_INTERVAL_MS: 2000
    entrypoint:
      - /bin/sh
      - -lc
      - |
          ip=$$(getent ahostsv4 foundationdb | awk 'NR==1{print $$1; exit}')
          export FDB_CLUSTER_FILE_CONTENTS="docker:docker@$${ip}:4500"
          exec metadata
    depends_on:
      foundationdb-init:
        condition: service_completed_successfully
    ports:
      - "3001:3001"

  chunker-a:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: chunker-service
    environment:
      CHUNKER_LOG_FILTER: chunker=info,tower_http=info
      CHUNK_PORT: 3002
    volumes:
      - chunk_a_data:/data/chunks
    ports:
      - "3002:3002"

  chunker-b:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: chunker-service
    environment:
      CHUNKER_LOG_FILTER: chunker=info,tower_http=info
      CHUNK_PORT: 3002
    volumes:
      - chunk_b_data:/data/chunks
    ports:
      - "3003:3002"

  api-a:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: api-service
    environment:
      API_SERVICE_LOG_FILTER: api_service=info,tower_http=info
      API_SERVICE_ADDR: 0.0.0.0:3000
      METADATA_SERVICE_URL: http://metadata:3001
      API_GET_BATCH_WINDOW: 16
      API_EC_DATA_SHARDS: 1
      API_EC_PARITY_SHARDS: 0
    depends_on:
      - metadata
      - chunker-a
      - chunker-b
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=PathPrefix(`/`)
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.routers.api.service=api-svc
      - traefik.http.services.api-svc.loadbalancer.server.port=3000

  api-b:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: api-service
    environment:
      API_SERVICE_LOG_FILTER: api_service=info,tower_http=info
      API_SERVICE_ADDR: 0.0.0.0:3000
      METADATA_SERVICE_URL: http://metadata:3001
      API_GET_BATCH_WINDOW: 16
      API_EC_DATA_SHARDS: 1
      API_EC_PARITY_SHARDS: 0
    depends_on:
      - metadata
      - chunker-a
      - chunker-b
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=PathPrefix(`/`)
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.routers.api.service=api-svc
      - traefik.http.services.api-svc.loadbalancer.server.port=3000

  traefik:
    image: traefik:v3.1
    depends_on:
      - api-a
      - api-b
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:3000
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  foundationdb_data:
  foundationdb_logs:
  chunk_a_data:
  chunk_b_data:

services:
  coordinator:
    build:
      context: ..
      dockerfile: Dockerfile
      target: coordinator
    environment:
      COORDINATOR_CONFIG_PATH: /app/config/coordinator.yaml
    volumes:
      - ./configs/coordinator.yaml:/app/config/coordinator.yaml:ro
      - coordinator_single_data:/app/data
    ports:
      - "9000:9000"
    networks:
      - back

  volume-a:
    build:
      context: ..
      dockerfile: Dockerfile
      target: volume
    environment:
      VOLUME_CONFIG_PATH: /app/config/volume.yaml
      VOLUME_SERVER_ID: volume-a
      VOLUME_PUBLIC_URL: http://volume-a:9002
      VOLUME_COORDINATOR_URL: http://coordinator:9000
    volumes:
      - ./configs/volume.yaml:/app/config/volume.yaml:ro
      - volume_a_single_data:/app/data
    networks:
      - back

  volume-b:
    build:
      context: ..
      dockerfile: Dockerfile
      target: volume
    environment:
      VOLUME_CONFIG_PATH: /app/config/volume.yaml
      VOLUME_SERVER_ID: volume-b
      VOLUME_PUBLIC_URL: http://volume-b:9002
      VOLUME_COORDINATOR_URL: http://coordinator:9000
    volumes:
      - ./configs/volume.yaml:/app/config/volume.yaml:ro
      - volume_b_single_data:/app/data
    networks:
      - back

  volume-c:
    build:
      context: ..
      dockerfile: Dockerfile
      target: volume
    environment:
      VOLUME_CONFIG_PATH: /app/config/volume.yaml
      VOLUME_SERVER_ID: volume-c
      VOLUME_PUBLIC_URL: http://volume-c:9002
      VOLUME_COORDINATOR_URL: http://coordinator:9000
    volumes:
      - ./configs/volume.yaml:/app/config/volume.yaml:ro
      - volume_c_single_data:/app/data
    networks:
      - back

networks:
  back:

volumes:
  coordinator_single_data:
  volume_a_single_data:
  volume_b_single_data:
  volume_c_single_data:
